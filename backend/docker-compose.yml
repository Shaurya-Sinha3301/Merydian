services:
  backend:
    build:
      context: ../
      dockerfile: backend/Dockerfile

    container_name: meiliai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app
      - ../ml_or:/app/ml_or
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: meiliai_celery_worker
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - backend
    volumes:
      - .:/app
      - ../ml_or:/app/ml_or
    command: celery -A app.core.celery_app worker --loglevel=info

  redis:
    image: redis:7-alpine
    container_name: meiliai_redis
    ports:
      - "6379:6379"
