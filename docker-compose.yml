# ─── Shared build config ──────────────────────────────────────────────────────
x-backend-build: &backend-build
  context: .
  dockerfile: Dockerfile

services:

  # ── 1. Redis (broker + result backend + cache) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: meiliai_redis
    restart: unless-stopped
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 2. DB Migration (runs Alembic, then exits) ──────────────────────────────
  migrate:
    build: *backend-build
    container_name: meiliai_migrate
    command: [ "migrate" ]
    environment: *backend-env
    volumes: *backend-volumes
    restart: "no"

  # ── 3. FastAPI Application ──────────────────────────────────────────────────
  api:
    build: *backend-build
    container_name: meiliai_api
    restart: unless-stopped
    command: [ "api" ]
    environment: *backend-env
    volumes: *backend-volumes
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── 4. Celery Worker (booking jobs + agent tasks + events) ──────────────────
  celery_worker:
    build: *backend-build
    container_name: meiliai_celery_worker
    restart: unless-stopped
    command: [ "worker" ]
    environment: *backend-env
    volumes: *backend-volumes
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # ── 5. Celery Beat (periodic scheduler) ────────────────────────────────────
  celery_beat:
    build: *backend-build
    container_name: meiliai_celery_beat
    restart: unless-stopped
    command: [ "beat" ]
    environment: *backend-env
    volumes: *backend-volumes
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── 6. Flower (Celery monitoring UI — admin/admin) ──────────────────────────
  flower:
    build: *backend-build
    container_name: meiliai_flower
    restart: unless-stopped
    command: [ "flower" ]
    environment:
      <<: *backend-env
      FLOWER_USER: "admin"
      FLOWER_PASSWORD: "admin"
    volumes: *backend-volumes
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
    driver: local
  trip_sessions:
    driver: local
  optimizer_outputs:
    driver: local

networks:
  default:
    name: meiliai_network
    driver: bridge
